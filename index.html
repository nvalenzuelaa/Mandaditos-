<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandaditos Posadas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #ffc107; --dark: #212529; --success: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        h1 { text-align: center; font-size: 22px; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        
        .card { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; margin-bottom: 10px; }
        
        #map { height: 200px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid #ddd; }
        
        .total-box { background: var(--dark); color: var(--primary); padding: 15px; border-radius: 12px; text-align: center; font-size: 19px; font-weight: bold; }
        .btn-send { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        .hidden { display: none; }
        .small-print { font-size: 11px; color: #777; text-align: center; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛵 Mandaditos Posadas</h1>

    <div class="card">
        <label>¿Qué servicio necesitás?</label>
        <select id="tipo-servicio" onchange="cambiarServicio()">
            <option value="Mandado normal">Mandado normal</option>
            <option value="Retiro de productos o estudios medicos">Retiro de productos o estudios médicos</option>
            <option value="Compras">Compras</option>
        </select>
    </div>

    <div class="card">
        <label id="txt-origen">📍 ¿Dónde retiramos?</label>
        <input id="origen" type="text" placeholder="Ej: Supermercado, Farmacia o Calle...">

        <label id="txt-destino">📍 ¿Dónde entregamos?</label>
        <input id="destino" type="text" placeholder="Tu dirección o barrio">

        <label id="txt-detalle">📦 Detalles (ser lo más específico posible):</label>

    <div id="seccion-pagos" class="card hidden">
        <label>💰 ¿Hay que abonar en el lugar?</label>
        <select id="pago-si-no" onchange="mostrarMonto()">
            <option value="no">No, ya está pago</option>
            <option value="si">Sí, hay que pagar</option>
        </select>
        <div id="caja-monto" class="hidden">
            <label>Monto estimado para la compra/trámite:</label>
            <input id="monto-valor" type="number" placeholder="$ 0.00">
        </div>
    </div>

    <div id="map"></div>

    <div class="total-box">
        Total Estimado: <span id="total-text">$ 1.200</span>
    </div>

    <button class="btn-send" onclick="enviarPedido()">Pedir Mandadito por WhatsApp 📲</button>

    <p class="small-print">
        * El precio total varía según la distancia real.<br>
        * Retiro de productos o compras tienen un cargo de gestión + envío.<br>
        * Esperas mayores a 30 min. tienen recargo.
    </p>
</div>

<script>
    const MI_WHATSAPP = "5493764904731"; 
    let map, marker;

    function initMap() {
        map = L.map('map').setView([-27.367, -55.896], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([-27.367, -55.896], {draggable: true}).addTo(map);
    }

    function cambiarServicio() {
        const servicio = document.getElementById("tipo-servicio").value;
        const seccionPagos = document.getElementById("seccion-pagos");
        const totalText = document.getElementById("total-text");

        if (servicio === "Mandado normal") {
            seccionPagos.classList.add("hidden");
            totalText.innerText = "$ 1.200 + envío";
        } else {
            seccionPagos.classList.remove("hidden");
            totalText.innerText = (servicio === "Compras") ? "$ 2.000 + envío" : "$ 5.000 + envío";
        }
    }

    function mostrarMonto() {
        const pago = document.getElementById("pago-si-no").value;
        document.getElementById("caja-monto").classList.toggle("hidden", pago !== "si");
    }

    function enviarPedido() {
        const servicio = document.getElementById("tipo-servicio").value;
        const ori = document.getElementById("origen").value;
        const des = document.getElementById("destino").value;
        const det = document.getElementById("detalle").value;
        const paga = document.getElementById("pago-si-no").value;
        const monto = document.getElementById("monto-valor").value;
        const presupuesto = document.getElementById("total-text").innerText;

        if(!ori || !des || !det) return alert("Por favor, completá los datos.");

        let msg = `*NUEVO PEDIDO: ${servicio.toUpperCase()}*%0A%0A`;
        msg += `📍 *Lugar:* ${ori}%0A`;
        msg += `📍 *Entrega:* ${des}%0A`;
        msg += `📦 *Detalle:* ${det}%0A`;
        
        if (servicio !== "Mandado normal") {
            msg += `💰 *Abona en lugar:* ${paga === 'si' ? 'SÍ ($' + monto + ')' : 'NO'}%0A`;
        }

        msg += `%0A💵 *Presupuesto base:* ${presupuesto}%0A`;
        msg += `_Nota: Sujeto a espera > 30 min._`;

        window.open(`https://wa.me/${MI_WHATSAPP}?text=${msg}`);
    }

    window.onload = function() {
        initMap();
        cambiarServicio();
    };
</script>

</body>
</html>
