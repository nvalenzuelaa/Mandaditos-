<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Mandaditos App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root { --brand: #2563eb; }

body { background-color: #f8fafc; font-size: 13px; font-family: sans-serif; overflow-x: hidden; }

.app-container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }

#map-container { width: 100%; height: 380px; position: relative; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; background: #f1f5f9; }

#map { height: 100%; width: 100%; }

.hidden { display: none !important; }

.input-mini { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 13px; outline: none; background: #f1f5f9; }

.input-mini:focus { border-color: var(--brand); background: #fff; }

.btn-main { background: var(--brand); color: white; padding: 15px; border-radius: 16px; font-weight: 700; width: 100%; text-transform: uppercase; }

.btn-back { color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 11px; display: inline-flex; items-center; margin-bottom: 10px; cursor: pointer; }

.card-servicio { border: 1px solid #e2e8f0; padding: 15px; border-radius: 20px; display: flex; items-center; gap: 12px; cursor: pointer; background: #fff; margin-bottom: 10px; }

.precio-box { background: #1e293b; color: white; padding: 20px; border-radius: 24px 24px 0 0; position: sticky; bottom: 0; }

</style>

</head>

<body onload="verificarHorario()">



<div class="app-container shadow-2xl">

<div class="p-6 pb-4 text-center">

<h1 class="text-2xl font-black tracking-tighter text-slate-900 leading-none">Mandaditos</h1>

<p class="text-slate-400 font-bold text-xs mt-1 italic">Tu moto de confianza 🏍️</p>

</div>



<div id="contenidoApp" class="flex flex-col flex-grow">

<div id="paso1" class="p-6">

<p class="text-[10px] uppercase font-black tracking-widest text-slate-400 mb-4">Elegí el servicio</p>

<div onclick="irAPaso2('📦 Envío', 0)" class="card-servicio"><span class="text-2xl">📦</span> <b class="text-slate-800">Envíos</b></div>

<div onclick="irAPaso2('🏥 Médico', 5000)" class="card-servicio"><span class="text-2xl">🏥</span> <b class="text-slate-800">Estudios / Médico</b></div>

<div onclick="irAPaso2('💊 Farmacia', 5000)" class="card-servicio"><span class="text-2xl">💊</span> <b class="text-slate-800">Farmacia</b></div>

<div onclick="irAPaso2('📄 Trámites', 5000)" class="card-servicio"><span class="text-2xl">📄</span> <b class="text-slate-800">Trámites</b></div>

</div>



<div id="paso2" class="hidden flex flex-col flex-grow">

<div class="px-6 pb-4">

<div onclick="volverAPaso1()" class="btn-back">⬅️ Volver</div>

<div class="space-y-2">

<input id="inputO" type="text" placeholder="📍 ¿Dónde retiramos?" class="input-mini">

<input id="inputD" type="text" placeholder="🏁 ¿A dónde llevamos?" class="input-mini">

</div>

</div>

<div id="map-container"><div id="map"></div></div>

<div id="boxPrecio" class="precio-box hidden">

<div class="flex justify-between items-center">

<div><p class="text-3xl font-black italic text-white">$`<span id="precioTotal">0</span></p></div>

<button onclick="irAPaso3()" class="bg-blue-600 px-6 py-3 rounded-xl font-black uppercase text-xs text-white">Siguiente</button>

</div>

</div>

</div>



<div id="paso3" class="hidden p-6 space-y-5">

<div onclick="volverAPaso2()" class="btn-back">⬅️ Volver al mapa</div>

<div class="space-y-4">

<div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">

<p class="text-[10px] font-black text-slate-400 uppercase mb-2">👤 Persona que envía</p>

<input id="fNombreO" type="text" placeholder="Nombre" class="input-mini mb-2">

<input id="fTelO" type="tel" placeholder="WhatsApp (Ej: 3764000000)" class="input-mini">

</div>

<div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">

<p class="text-[10px] font-black text-slate-400 uppercase mb-2">📦 Persona que recibe</p>

<input id="fNombreD" type="text" placeholder="Nombre" class="input-mini mb-2">

<input id="fTelD" type="tel" placeholder="WhatsApp" class="input-mini">

</div>

<div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">

<p class="text-[10px] font-black text-slate-400 uppercase mb-2">¿Hay que abonar algo al retirar?</p>

<div class="flex gap-6 font-bold text-slate-700">

<label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pago" value="si" onclick="document.getElementById('boxMonto').classList.remove('hidden')"> SÍ</label>

<label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pago" value="no" checked onclick="document.getElementById('boxMonto').classList.add('hidden')"> NO</label>

</div>

<div id="boxMonto" class="hidden mt-3"><input id="fMonto" type="number" placeholder="¿Cuánto dinero?" class="input-mini"></div>

</div>

<textarea id="obs" placeholder="Observaciones adicionales..." class="input-mini h-20"></textarea>

</div>

<button onclick="enviarWhatsApp()" class="btn-main !bg-green-600">Pedir Mandadito 🚀</button>

</div>

</div>

</div>



<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzsxnmmifNkfPptHzLdFyz_v26u9wdKCU&libraries=places"></script>

<script>

let map, directionsService, directionsRenderer, markerO, markerD, geocoder;

let servSelect = "", costoEnvio = 0, plusServicio = 0;



function verificarHorario() {

const hora = new Date().getHours();

if (hora < 9 || hora >= 18) { /* Aquí podrías bloquear la app si quisieras */ }

}



function irAPaso2(servicio, plus) {

servSelect = servicio; plusServicio = plus;

document.getElementById('paso1').classList.add('hidden');

document.getElementById('paso2').classList.remove('hidden');

setTimeout(() => { if (!map) initMap(); else google.maps.event.trigger(map, 'resize'); }, 300);

}



function volverAPaso1() { document.getElementById('paso2').classList.add('hidden'); document.getElementById('paso1').classList.remove('hidden'); }

function volverAPaso2() { document.getElementById('paso3').classList.add('hidden'); document.getElementById('paso2').classList.remove('hidden'); }

function irAPaso3() { document.getElementById('paso2').classList.add('hidden'); document.getElementById('paso3').classList.remove('hidden'); window.scrollTo(0,0); }



function initMap() {

geocoder = new google.maps.Geocoder();

const posO = { lat: -27.3670, lng: -55.8961 };

directionsService = new google.maps.DirectionsService();

directionsRenderer = new google.maps.DirectionsRenderer({ polylineOptions: { strokeColor: "#2563eb", strokeWeight: 5 }, suppressMarkers: true });

map = new google.maps.Map(document.getElementById("map"), { center: posO, zoom: 14, disableDefaultUI: true, gestureHandling: "greedy" });

directionsRenderer.setMap(map);

markerO = new google.maps.Marker({ position: posO, map, draggable: true });

markerD = new google.maps.Marker({ position: { lat: -27.38, lng: -55.91 }, map, draggable: true });



const autoO = new google.maps.places.Autocomplete(document.getElementById("inputO"));

const autoD = new google.maps.places.Autocomplete(document.getElementById("inputD"));



autoO.addListener('place_changed', () => {

const place = autoO.getPlace();

if(place.geometry) { markerO.setPosition(place.geometry.location); map.setCenter(markerO.getPosition()); trazar(); }

});

autoD.addListener('place_changed', () => {

const place = autoD.getPlace();

if(place.geometry) { markerD.setPosition(place.geometry.location); trazar(); }

});



markerO.addListener('dragend', () => reverseGeocode(markerO.getPosition(), 'O'));

markerD.addListener('dragend', () => reverseGeocode(markerD.getPosition(), 'D'));

}



function reverseGeocode(pos, type) {

geocoder.geocode({ location: pos }, (results, status) => {

if (status === "OK" && results[0]) {

if (type === 'O') document.getElementById('inputO').value = results[0].formatted_address;

else document.getElementById('inputD').value = results[0].formatted_address;

trazar();

}

});

}



function trazar() {

directionsService.route({ origin: markerO.getPosition(), destination: markerD.getPosition(), travelMode: 'DRIVING' }, (res, stat) => {

if (stat === 'OK') {

directionsRenderer.setDirections(res);

let kms = (res.routes[0].legs[0].distance.value / 1000);

costoEnvio = Math.ceil((3000 + (kms * 350) + plusServicio) / 100) * 100;

document.getElementById('precioTotal').innerText = costoEnvio.toLocaleString('es-AR');

document.getElementById('boxPrecio').classList.remove('hidden');

}

});

}



function enviarWhatsApp() {

const nO = document.getElementById('fNombreO').value || "-";

const tO = document.getElementById('fTelO').value.replace(/\D/g,'');

const dO = document.getElementById('inputO').value;



const nD = document.getElementById('fNombreD').value || "-";

const tD = document.getElementById('fTelD').value.replace(/\D/g,'');

const dD = document.getElementById('inputD').value;



const obs = document.getElementById('obs').value || "Ninguna";

const hayQuePagar = document.querySelector('input[name="pago"]:checked').value === "si";

const montoEfectivo = hayQuePagar ? parseFloat(document.getElementById('fMonto').value || 0) : 0;



let msg = *Comanda*%0A%0A;

msg += *Datos del que envía:*%0A;

msg += Nombre:${nO}%0A; msg +=WhatsApp: https://wa.me/ {dO}%0A; msg +=Dirección en Google: http://maps.google.com/?q= {markerO.getPosition().lng()}%0A; msg +=Observaciones: {nD}%0A; msg +=WhatsApp: https://wa.me/ {dD}%0A; msg +=Dirección en Google: http://maps.google.com/?q= {markerD.getPosition().lng()}%0A; msg +=Observaciones: - %0A%0A; msg +=-----------------------%0A; msg +=Montos:%0A; msg +=Envío: ${costoEnvio}%0A;



if(hayQuePagar) {

msg += Abonar:${montoEfectivo}%0A`;

}



msg += *Total a cobrar:* ${costoEnvio + montoEfectivo}`;



const url = https://api.whatsapp.com/send?phone=543764904731&text=${msg}`;



// Redirección directa para máxima compatibilidad

window.location.href = url;

}

</script>

</body>

</html>
