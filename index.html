<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandaditos App - Retiro de Productos</title>
    <style>
        :root { --primary: #ffc107; --dark: #212529; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: var(--dark); }
        .container { max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        h1 { text-align: center; font-size: 20px; margin-bottom: 20px; color: var(--dark); border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 700; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; margin-top: 5px; outline: none; }
        input:focus { border-color: var(--primary); }
        .total-box { background: var(--dark); color: var(--primary); padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; font-size: 18px; font-weight: bold; }
        .monto-abono { display: none; background: #fff9e6; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .btn-send { background: #25d366; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-send:active { transform: scale(0.98); }
        .small-print { font-size: 11px; color: #888; text-align: center; margin-top: 15px; line-height: 1.4; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Retiro de productos o estudios médicos</h1>

    <label>📍 ¿Dónde hay que retirar?</label>
    <input id="origen" type="text" placeholder="Ej: Laboratorio central o Calle... 123">

    <label>📍 ¿Dónde hay que entregar?</label>
    <input id="destino" type="text" placeholder="Barrio o dirección de entrega">

    <label>📦 ¿Qué hay que retirar?</label>
    <textarea id="detalle" rows="3" placeholder="Ej: Estudios Rayos X a nombre de Juan Pérez. Sea lo más específico posible."></textarea>

    <label>💰 ¿Hay que abonar al retirar?</label>
    <select id="pago-si-no" onchange="toggleMonto()">
        <option value="no">No, ya está pago / es gratis</option>
        <option value="si">Sí, hay que pagar en el lugar</option>
    </select>

    <div id="caja-monto" class="monto-abono">
        <label>¿Cuánto hay que abonar en el retiro?</label>
        <input id="monto-producto" type="number" placeholder="Ej: 2500">
    </div>

    <div class="total-box">
        Precio Estimado: <span id="total-final">$ 5.000</span>
    </div>

    <button class="btn-send" onclick="enviarWhatsApp()">Pedir Mandadito 🛵</button>

    <p class="small-print">
        * El precio total incluye envío + $5.000 por servicio de gestión.<br>
        * Por una espera de más de 30 minutos el precio puede variar.
    </p>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const MI_NUMERO = "5493764000000"; // CAMBIÁ ESTO POR TU WHATSAPP (CON 549)
    const COMISION = 5000;
    
    function toggleMonto() {
        const seleccion = document.getElementById("pago-si-no").value;
        document.getElementById("caja-monto").style.display = (seleccion === "si") ? "block" : "none";
    }

    function enviarWhatsApp() {
        const ori = document.getElementById("origen").value;
        const des = document.getElementById("destino").value;
        const det = document.getElementById("detalle").value;
        const paga = document.getElementById("pago-si-no").value;
        const montoProd = document.getElementById("monto-producto").value || "0";

        if (!ori || !des || !det) {
            alert("Por favor completá los datos de retiro y entrega.");
            return;
        }

        let mensaje = `*NUEVO PEDIDO: RETIRO/ESTUDIOS*%0A%0A`;
        mensaje += `📍 *Retirar en:* ${ori}%0A`;
        mensaje += `📍 *Entregar en:* ${des}%0A`;
        mensaje += `📦 *Detalle:* ${det}%0A`;
        mensaje += `💰 *¿Paga producto?:* ${paga === 'si' ? 'SÍ ($' + montoProd + ')' : 'NO'}%0A%0A`;
        mensaje += `💵 *TOTAL ENVÍO + SERVICIO:* $${COMISION} + Envío%0A`;
        mensaje += `_Nota: Precio sujeto a espera mayor a 30 min._`;

        window.open(`https://wa.me/${MI_NUMERO}?text=${mensaje}`, '_blank');
    }
</script>

</body>
</html>
