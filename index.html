<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandaditos Posadas</title>
    <!-- Agregamos un capturador de errores de Google -->
    <script>
        window.gm_authFailure = function() { 
            alert("Error de Google Maps: Revisá si tu API Key tiene la facturación activa o si las APIs están habilitadas.");
        };
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzsxnmmifNkPptHzLdFyz_v26u9wdKCU&libraries=places"></script>
    <style>
        :root { --primary: #ffc107; --dark: #212529; --success: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        h1 { text-align: center; font-size: 22px; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; margin-bottom: 10px; }
        #map { height: 250px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid #ddd; background-color: #e5e3df; }
        .total-box { background: var(--dark); color: var(--primary); padding: 15px; border-radius: 12px; text-align: center; font-size: 19px; font-weight: bold; }
        .btn-send { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛵 Mandaditos Posadas</h1>
    <div class="card">
        <label>Servicio:</label>
        <select id="tipo-servicio" onchange="cambiarServicio()">
            <option value="Mandado normal">Mandado normal</option>
            <option value="Retiro de productos o estudios medicos">Retiro de productos o estudios médicos</option>
            <option value="Compras">Compras</option>
        </select>
    </div>
    <div class="card">
        <label>📍 Origen:</label>
        <input id="origen" type="text" placeholder="Calle y altura...">
        <label>📍 Destino:</label>
        <input id="destino" type="text" placeholder="Dirección de entrega...">
        <label>📦 Detalles:</label>
        <textarea id="detalle" rows="2"></textarea>
    </div>
    <div id="seccion-pagos" class="card hidden">
        <label>💰 ¿Abonar en lugar?</label>
        <select id="pago-si-no" onchange="mostrarMonto()"><option value="no">No</option><option value="si">Sí</option></select>
        <div id="caja-monto" class="hidden"><input id="monto-valor" type="number" placeholder="Monto $"></div>
    </div>
    <div id="map"></div>
    <div class="total-box">Total: <span id="total-text">$ 1.200</span></div>
    <button class="btn-send" onclick="enviarPedido()">WhatsApp 📲</button>
</div>
<script>
    const MI_WHATSAPP = "5493764904731";
    let map, marker, autocompleteOri, autocompleteDes;
    function initMap() {
        const posadas = { lat: -27.367, lng: -55.896 };
        map = new google.maps.Map(document.getElementById("map"), { zoom: 13, center: posadas });
        marker = new google.maps.Marker({ map: map, draggable: true, position: posadas });
        autocompleteOri = new google.maps.places.Autocomplete(document.getElementById('origen'));
        autocompleteDes = new google.maps.places.Autocomplete(document.getElementById('destino'));
        autocompleteOri.addListener('place_changed', () => {
            let p = autocompleteOri.getPlace();
            if(p.geometry){ map.setCenter(p.geometry.location); marker.setPosition(p.geometry.location); }
        });
        autocompleteDes.addListener('place_changed', () => {
            let p = autocompleteDes.getPlace();
            if(p.geometry){ map.setCenter(p.geometry.location); marker.setPosition(p.geometry.location); }
        });
    }
    function cambiarServicio() {
        let s = document.getElementById("tipo-servicio").value;
        document.getElementById("seccion-pagos").classList.toggle("hidden", s === "Mandado normal");
        document.getElementById("total-text").innerText = (s === "Mandado normal") ? "$ 1.200 + envío" : (s === "Compras" ? "$ 2.000 + envío" : "$ 5.000 + envío");
    }
    function mostrarMonto() {
        document.getElementById("caja-monto").classList.toggle("hidden", document.getElementById("pago-si-no").value !== "si");
    }
    function enviarPedido() {
        let ori = document.getElementById("origen").value, des = document.getElementById("destino").value, pos = marker.getPosition();
        if(!ori || !des) return alert("Faltan direcciones");
        let msg = `*PEDIDO: ${document.getElementById("tipo-servicio").value.toUpperCase()}*%0A📍Retiro: ${ori}%0A📍Entrega: ${des}%0A💰Total: ${document.getElementById("total-text").innerText}%0A📍Mapa: https://www.google.com/maps?q=${pos.lat()},${pos.lng()}`;
        window.open(`https://wa.me/${MI_WHATSAPP}?text=${msg}`);
    }
    google.maps.event.addDomListener(window, 'load', initMap);
</script>
</body>
</html>
