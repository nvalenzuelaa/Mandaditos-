<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mandaditos App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --brand: #2563eb; }
        body { background-color: #f8fafc; font-size: 13px; font-family: sans-serif; overflow-x: hidden; }
        .app-container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        #map-container { width: 100%; height: 300px; position: relative; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; background: #f1f5f9; margin-top: 10px; }
        #map { height: 100%; width: 100%; }
        .input-mini { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 13px; outline: none; background: #f1f5f9; }
        .input-mini:focus { border-color: var(--brand); background: #fff; }
        .btn-main { background: #16a34a; color: white; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; text-transform: uppercase; font-size: 15px; margin-bottom: 40px; }
        .precio-box { background: #1e293b; color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .hidden { display: none !important; }
        .section-card { background: #ffffff; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; margin-top: 15px; }
        .label-bold { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
    </style>
</head>
<body onload="initMap()">

<div class="app-container shadow-2xl p-4">
    <div class="text-center mb-4">
        <h1 class="text-2xl font-black tracking-tighter text-slate-900 leading-none">Solicitud de Motomandado</h1>
        <p class="text-slate-400 font-bold text-xs mt-1 italic">Servicio Puerta a Puerta 🏍️</p>
    </div>

    <div class="space-y-2">
        <input id="inputO" type="text" placeholder="📍 ¿Dónde retiramos?" class="input-mini">
        <input id="inputD" type="text" placeholder="🏁 ¿A dónde llevamos?" class="input-mini">
    </div>

    <div id="map-container" class="rounded-2xl overflow-hidden shadow-inner">
        <div id="map"></div>
    </div>

    <div class="section-card">
        <span class="label-bold">👤 Datos del que Envía</span>
        <div class="grid grid-cols-2 gap-2">
            <input id="fNombreO" type="text" placeholder="Nombre" class="input-mini">
            <input id="fTelO" type="tel" placeholder="WhatsApp" class="input-mini">
        </div>
    </div>

    <div class="section-card">
        <span class="label-bold">📦 Datos del que Recibe</span>
        <div class="grid grid-cols-2 gap-2">
            <input id="fNombreD" type="text" placeholder="Nombre" class="input-mini">
            <input id="fTelD" type="tel" placeholder="WhatsApp" class="input-mini">
        </div>
    </div>

    <div class="section-card">
        <span class="label-bold text-center">¿Hay que abonar algo al retirar?</span>
        <div class="flex justify-center gap-10 font-bold text-slate-700 my-2">
            <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pago" value="si" onclick="document.getElementById('boxMonto').classList.remove('hidden')"> SÍ</label>
            <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pago" value="no" checked onclick="document.getElementById('boxMonto').classList.add('hidden')"> NO</label>
        </div>
        <div id="boxMonto" class="hidden mt-3">
            <input id="fMonto" type="number" placeholder="Monto a pagar en el retiro $" class="input-mini text-center border-blue-200">
        </div>
        <div class="mt-4">
            <span class="label-bold">¿Qué llevamos?</span>
            <textarea id="obs" placeholder="Detalles del paquete u observaciones..." class="input-mini h-20"></textarea>
        </div>
    </div>

    <div id="boxPrecio" class="mt-6 hidden">
        <div class="precio-box">
            <p class="text-[10px] uppercase font-bold text-slate-400">Costo del envío</p>
            <p class="text-3xl font-black italic">$<span id="precioTotal">0</span></p>
        </div>
        <button onclick="enviarWhatsApp()" class="btn-main">Pedir Motomandado 🚀</button>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzsxnmmifNkfPptHzLdFyz_v26u9wdKCU&libraries=places"></script>

<script>
let map, directionsService, directionsRenderer, markerO, markerD, geocoder;
let costoEnvio = 0;

function initMap() {
    geocoder = new google.maps.Geocoder();
    const posO = { lat: -27.3670, lng: -55.8961 };
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({ 
        polylineOptions: { strokeColor: "#2563eb", strokeWeight: 5 }, 
        suppressMarkers: true 
    });
    
    map = new google.maps.Map(document.getElementById("map"), { 
        center: posO, 
        zoom: 14, 
        disableDefaultUI: true, 
        gestureHandling: "greedy" 
    });
    
    directionsRenderer.setMap(map);
    markerO = new google.maps.Marker({ position: posO, map, draggable: true, label: "A" });
    markerD = new google.maps.Marker({ position: { lat: -27.38, lng: -55.91 }, map, draggable: true, label: "B" });

    const autoO = new google.maps.places.Autocomplete(document.getElementById("inputO"));
    const autoD = new google.maps.places.Autocomplete(document.getElementById("inputD"));

    autoO.addListener('place_changed', () => {
        const place = autoO.getPlace();
        if(place.geometry) { markerO.setPosition(place.geometry.location); map.setCenter(markerO.getPosition()); trazar(); }
    });
    autoD.addListener('place_changed', () => {
        const place = autoD.getPlace();
        if(place.geometry) { markerD.setPosition(place.geometry.location); trazar(); }
    });

    markerO.addListener('dragend', () => reverseGeocode(markerO.getPosition(), 'O'));
    markerD.addListener('dragend', () => reverseGeocode(markerD.getPosition(), 'D'));
}

function reverseGeocode(pos, type) {
    geocoder.geocode({ location: pos }, (results, status) => {
        if (status === "OK" && results[0]) {
            if (type === 'O') document.getElementById('inputO').value = results[0].formatted_address;
            else document.getElementById('inputD').value = results[0].formatted_address;
            trazar();
        }
    });
}

function trazar() {
    directionsService.route({ origin: markerO.getPosition(), destination: markerD.getPosition(), travelMode: 'DRIVING' }, (res, stat) => {
        if (stat === 'OK') {
            directionsRenderer.setDirections(res);
            let kms = (res.routes[0].legs[0].distance.value / 1000);
            // FORMULA: 3000 BASE + 350 KM
            costoEnvio = Math.ceil((3000 + (kms * 350)) / 100) * 100;
            document.getElementById('precioTotal').innerText = costoEnvio.toLocaleString('es-AR');
            document.getElementById('boxPrecio').classList.remove('hidden');
        }
    });
}

function enviarWhatsApp() {
    const nO = document.getElementById('fNombreO').value || "-";
    const tO = document.getElementById('fTelO').value || "-";
    const nD = document.getElementById('fNombreD').value || "-";
    const tD = document.getElementById('fTelD').value || "-";
    const dO = document.getElementById('inputO').value;
    const dD = document.getElementById('inputD').value;
    const obs = document.getElementById('obs').value || "Ninguna";
    const hayQuePagar = document.querySelector('input[name="pago"]:checked').value === "si";
    const montoEfectivo = hayQuePagar ? (document.getElementById('fMonto').value || 0) : 0;

    let msg = `*COMANDA MOTOMANDADO*%0A%0A`;
    msg += `👤 *QUIEN ENVÍA:*%0A- Nombre: ${nO}%0A- WhatsApp: ${tO}%0A- Retiro en: ${dO}%0A%0A`;
    msg += `📦 *QUIEN RECIBE:*%0A- Nombre: ${nD}%0A- WhatsApp: ${tD}%0A- Entrega en: ${dD}%0A%0A`;
    msg += `📝 *OBS:* ${obs}%0A%0A`;
    
    if(hayQuePagar) { msg += `💰 *Abonar en el retiro:* $${montoEfectivo}%0A`; }

    msg += `💵 *Costo Envío:* $${costoEnvio}%0A`;
    msg += `⭐ *TOTAL A COBRAR:* $${parseInt(costoEnvio) + parseInt(montoEfectivo)}%0A%0A`;
    msg += `📍 *Link GPS:* http://maps.google.com/maps?q=${markerO.getPosition().lat()},${markerO.getPosition().lng()}`;

    window.location.href = `https://api.whatsapp.com/send?phone=543764904731&text=${msg}`;
}
</script>
</body>
</html>
