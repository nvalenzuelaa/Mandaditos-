<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mandaditos App</title> 

<link rel="apple-touch-icon" href="png.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="icon" type="image/png" href="png.png"> 

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root { --brand: #1e40af; }
body { background-color: #f1f5f9; font-size: 13px; font-family: sans-serif; overflow-x: hidden; }
.app-container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 40px; position: relative; } 
.logo-header { height: 100px; width: auto; margin: 10px auto; object-fit: contain; } 

/* Modo No Trabajando Overlay */
#overlay-cerrado { position: absolute; top: 110px; left: 0; width: 100%; height: calc(100% - 110px); background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; }
.aviso-cerrado { background: #1e293b; color: white; padding: 30px; border-radius: 25px; font-weight: bold; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

#map-container { width: 100%; height: 280px; position: relative; border-top: 2px solid #e2e8f0; border-bottom: 2px solid #e2e8f0; background: #f1f5f9; margin-top: 10px; }
#map { height: 100%; width: 100%; }
.input-mini { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 13px; outline: none; background: #f8fafc; }

.btn-main { background: #16a34a; color: white; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; text-transform: uppercase; font-size: 16px; margin-bottom: 20px; }
.btn-disabled { background: #94a3b8 !important; opacity: 0.6; cursor: not-allowed; }

.precio-box { background: #0f172a; color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 10px; border: 2px solid #334155; }
.hidden { display: none !important; }
.section-card { background: #ffffff; padding: 16px; border-radius: 20px; border: 2px solid #f1f5f9; margin-top: 15px; }
.label-strong { font-size: 11px; font-weight: 900; color: #1e40af; text-transform: uppercase; margin-bottom: 6px; display: block; padding-left: 4px; }
.tab-btn { flex: 1; padding: 10px 4px; font-weight: bold; border-radius: 10px; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
.tab-active { background: #1e40af; color: white; }
.tab-inactive { background: #e2e8f0; color: #64748b; }

/* Switch Status */
.status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; padding: 8px 15px; background: white; border-radius: 50px; border: 1px solid #e2e8f0; width: fit-content; margin: 0 auto 15px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-on { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
.dot-off { background: #ef4444; box-shadow: 0 0 5px #ef4444; }
</style>
</head>
<body onload="initMap()"> 

<div id="contenido-app" class="app-container shadow-2xl p-4">
    
    <!-- ESTADO DE TRABAJO -->
    <div class="status-bar shadow-sm">
        <div id="dotStatus" class="dot dot-on"></div>
        <select id="switchTrabajo" onchange="toggleTrabajo()" class="font-bold text-[11px] outline-none bg-transparent uppercase tracking-tighter">
            <option value="on">Disponible ahora</option>
            <option value="off">No estoy trabajando</option>
        </select>
    </div>

    <!-- PANTALLA FUERA DE SERVICIO -->
    <div id="overlay-cerrado">
        <div class="aviso-cerrado">
            <p class="text-lg mb-1">¡No estoy trabajando! 😴</p>
            <p class="text-sm font-normal text-slate-300 italic">Vuelvo pronto 👋 Moto Mandaditos 🏍️</p>
        </div>
    </div>

    <div class="text-center mb-4">
        <img src="png.png" alt="Logo" class="logo-header">
    </div> 

    <!-- SELECTOR DE SERVICIO -->
    <div class="flex gap-2 mb-4 bg-slate-100 p-1 rounded-xl">
        <button id="btnEnvio" onclick="setServicio('envio')" class="tab-btn tab-active"><i class="fas fa-box"></i> Envío</button>
        <button id="btnCompra" onclick="setServicio('compra')" class="tab-btn tab-inactive"><i class="fas fa-shopping-cart"></i> Compra</button>
        <button id="btnTramite" onclick="setServicio('tramite')" class="tab-btn tab-inactive"><i class="fas fa-file-invoice"></i> Trámites</button>
    </div> 

    <div class="space-y-3 px-1">
        <div>
            <label class="label-strong">📍 PUNTO DE RETIRO (A)</label>
            <input id="inputO" type="text" placeholder="Mueva el pin 'A'..." class="input-mini border-blue-200">
        </div>
        <div>
            <label class="label-strong">🏁 PUNTO DE ENTREGA (B)</label>
            <input id="inputD" type="text" placeholder="Mueva el pin 'B'..." class="input-mini border-blue-200">
        </div>
    </div> 

    <div id="map-container" class="rounded-2xl overflow-hidden shadow-inner mt-4">
        <div id="map"></div>
    </div> 

    <!-- DATOS DE CONTACTO -->
    <div id="seccionDatosEnvio">
        <div class="section-card border-blue-100">
            <span class="label-strong"><i class="fas fa-user mr-1"></i> Quien envía</span>
            <div class="grid grid-cols-2 gap-2">
                <input id="fNombreO" type="text" placeholder="Nombre" class="input-mini">
                <input id="fTelO" type="tel" placeholder="WhatsApp" class="input-mini">
            </div>
        </div>
        <div class="section-card border-blue-100">
            <span class="label-strong"><i class="fas fa-box mr-1"></i> Quien recibe</span>
            <div class="grid grid-cols-2 gap-2">
                <input id="fNombreD" type="text" placeholder="Nombre" class="input-mini">
                <input id="fTelD" type="tel" placeholder="WhatsApp" class="input-mini">
            </div>
        </div>
    </div>

    <div id="seccionDatosSimples" class="hidden">
        <div class="section-card border-blue-100">
            <span class="label-strong"><i class="fas fa-id-card mr-1"></i> Tus Datos</span>
            <div class="grid grid-cols-2 gap-2">
                <input id="fNombreS" type="text" placeholder="Nombre" class="input-mini">
                <input id="fTelS" type="tel" placeholder="WhatsApp" class="input-mini">
            </div>
        </div>
    </div> 

    <div class="section-card bg-blue-50 border-blue-200">
        <span id="labelDetalle" class="label-strong border-none text-[11px]">¿Qué llevamos?</span>
        <textarea id="obs" placeholder="Detalle aquí su pedido..." class="input-mini h-24"></textarea>
        
        <div id="boxPagoMercaderia" class="mt-4 border-t border-blue-200 pt-4">
            <span class="label-strong text-center border-none text-[10px]">¿Hay que pagar mercadería al retirar?</span>
            <div class="flex justify-center gap-10 font-black text-slate-800 my-2">
                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pago" value="si" onclick="document.getElementById('boxMonto').classList.remove('hidden')"> SÍ</label>
                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pago" value="no" checked onclick="document.getElementById('boxMonto').classList.add('hidden')"> NO</label>
            </div>
            <div id="boxMonto" class="hidden mt-3">
                <input id="fMonto" type="number" placeholder="Monto a pagar $" class="input-mini text-center border-blue-400 font-bold">
            </div>
        </div>
    </div> 

    <!-- PRECIO Y BOTON -->
    <div class="mt-6">
        <div class="precio-box">
            <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Total del servicio</p>
            <p class="text-4xl font-black italic text-green-400">$<span id="precioTotal">0</span></p>
        </div>
        <button id="btnConfirmar" onclick="enviarWhatsApp()" class="btn-main shadow-lg"><i class="fab fa-whatsapp mr-2"></i> Confirmar Pedido</button>
    </div>
</div> 

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzsxnmmifNkfPptHzLdFyz_v26u9wdKCU&libraries=places"></script> 

<script>
let tipoServicio = 'envio';
let costoEnvio = 0;
let map, directionsService, directionsRenderer, markerO, markerD, geocoder;
let modoTrabajo = 'on';

function initMap() {
    geocoder = new google.maps.Geocoder();
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({ 
        polylineOptions: { strokeColor: "#1e40af", strokeWeight: 6 }, 
        suppressMarkers: true 
    });
    
    map = new google.maps.Map(document.getElementById("map"), { 
        center: { lat: -27.3670, lng: -55.8961 }, 
        zoom: 14, 
        disableDefaultUI: true 
    });
    directionsRenderer.setMap(map);

    markerO = new google.maps.Marker({ position: { lat: -27.3665, lng: -55.8955 }, map, draggable: true, label: "A" });
    markerD = new google.maps.Marker({ position: { lat: -27.3675, lng: -55.8965 }, map, draggable: true, label: "B" });

    // Eventos de movimiento para precio automático
    markerO.addListener('dragend', () => { reverseGeocode(markerO.getPosition(), 'inputO'); trazar(); });
    markerD.addListener('dragend', () => { reverseGeocode(markerD.getPosition(), 'inputD'); trazar(); });
}

function toggleTrabajo() {
    modoTrabajo = document.getElementById('switchTrabajo').value;
    const dot = document.getElementById('dotStatus');
    const overlay = document.getElementById('overlay-cerrado');
    const btn = document.getElementById('btnConfirmar');

    if(modoTrabajo === 'off') {
        dot.className = "dot dot-off";
        overlay.style.display = "flex";
        btn.classList.add('btn-disabled');
        btn.disabled = true;
    } else {
        dot.className = "dot dot-on";
        overlay.style.display = "none";
        btn.classList.remove('btn-disabled');
        btn.disabled = false;
    }
}

function reverseGeocode(pos, inputId) {
    geocoder.geocode({ location: pos }, (results, status) => {
        if (status === "OK" && results[0]) {
            document.getElementById(inputId).value = results[0].formatted_address;
        }
    });
}

function trazar() {
    if(modoTrabajo === 'off') return;
    
    directionsService.route({ 
        origin: markerO.getPosition(), 
        destination: markerD.getPosition(), 
        travelMode: 'DRIVING' 
    }, (res, stat) => {
        if (stat === 'OK') {
            directionsRenderer.setDirections(res);
            let kms = (res.routes[0].legs[0].distance.value / 1000);
            let basePrecio = (tipoServicio === 'envio') ? 3000 : 4000;
            costoEnvio = Math.ceil((basePrecio + (kms * 350)) / 100) * 100;
            document.getElementById('precioTotal').innerText = costoEnvio.toLocaleString('es-AR');
        }
    });
}

function setServicio(tipo) {
    tipoServicio = tipo;
    ['btnEnvio', 'btnCompra', 'btnTramite'].forEach(t => {
        document.getElementById(t).className = (t === 'btn' + tipo.charAt(0).toUpperCase() + tipo.slice(1)) ? "tab-btn tab-active" : "tab-btn tab-inactive";
    });
    document.getElementById('seccionDatosEnvio').classList.toggle('hidden', tipo !== 'envio');
    document.getElementById('seccionDatosSimples').classList.toggle('hidden', tipo === 'envio');
    document.getElementById('labelDetalle').innerText = (tipo === 'compra') ? "¿QUÉ COMPRAMOS?" : (tipo === 'tramite') ? "¿QUÉ TRÁMITES?" : "¿QUÉ LLEVAMOS?";
    trazar();
}

function enviarWhatsApp() {
    if(modoTrabajo === 'off') return;
    const linkO = `https://www.google.com/maps?q=${markerO.getPosition().lat()},${markerO.getPosition().lng()}`;
    const linkD = `https://www.google.com/maps?q=${markerD.getPosition().lat()},${markerD.getPosition().lng()}`;
    
    let nombreO = (tipoServicio === 'envio') ? document.getElementById('fNombreO').value : document.getElementById('fNombreS').value;
    let telO = (tipoServicio === 'envio') ? document.getElementById('fTelO').value : document.getElementById('fTelS').value;
    let nombreD = (tipoServicio === 'envio') ? document.getElementById('fNombreD').value : "Moto Mandaditos";
    let telD = (tipoServicio === 'envio') ? document.getElementById('fTelD').value : "";

    const hayPago = document.querySelector('input[name="pago"]:checked').value === 'si';
    const montoAbonar = hayPago ? parseInt(document.getElementById('fMonto').value) || 0 : 0;
    const totalFinal = costoEnvio + montoAbonar;

    let comanda = `*📋 TITULO: COMANDA MANDADITOS*%0A`;
    comanda += `*Servicio:* ${tipoServicio.toUpperCase()}%0A%0A`;
    comanda += `*📍 PUNTO RETIRO (A):*%0A👤 ${nombreO}%0A📱 https://wa.me/${telO.replace(/\D/g,'')}%0A🏠 ${document.getElementById('inputO').value}%0A🗺️ ${linkO}%0A%0A`;
    comanda += `*🏁 PUNTO ENTREGA (B):*%0A👤 ${nombreD}%0A`;
    if(telD) comanda += `📱 https://wa.me/${telD.replace(/\D/g,'')}%0A`;
    comanda += `🏠 ${document.getElementById('inputD').value}%0A🗺️ ${linkD}%0A%0A`;
    comanda += `*📝 DETALLES:* ${document.getElementById('obs').value}%0A%0A`;
    comanda += `*💰 TOTALES:*%0A🛵 Envío: $${costoEnvio}%0A`;
    if(hayPago) comanda += `🛒 Mercadería: $${montoAbonar}%0A`;
    comanda += `*💵 TOTAL A COBRAR: $${totalFinal}*`;

    window.location.href = `https://api.whatsapp.com/send?phone=543764904731&text=${comanda}`;
}
</script>
</body>
</html>
