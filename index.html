<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandaditos Posadas</title>
    <!-- Google Maps con Places y Directions -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzsxnmmifNkfPptHzLdFyz_v26u9wdKCU&libraries=places"></script>
    <style>
        :root { --primary: #ffc107; --dark: #212529; --success: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        h1 { text-align: center; font-size: 22px; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; margin-bottom: 10px; }
        #map { height: 250px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid #ddd; }
        .total-box { background: var(--dark); color: var(--primary); padding: 15px; border-radius: 12px; text-align: center; font-size: 19px; font-weight: bold; }
        .btn-send { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛵 Mandaditos Posadas</h1>

    <div class="card">
        <label>¿Qué servicio necesitás?</label>
        <select id="tipo-servicio" onchange="calcularRuta()">
            <option value="Mandado normal">Mandado normal</option>
            <option value="Retiro de productos o estudios medicos">Retiro de productos o estudios médicos</option>
            <option value="Compras">Compras</option>
        </select>
    </div>

    <div class="card">
        <label>📍 Lugar de Retiro / Compra:</label>
        <input id="origen" type="text" placeholder="Calle y altura...">
        
        <label>📍 Lugar de Entrega:</label>
        <input id="destino" type="text" placeholder="Dirección de entrega...">

        <label>📦 Detalles específicos:</label>
        <textarea id="detalle" rows="2" placeholder="Ej: Retirar pedido #123..."></textarea>
    </div>

    <div id="seccion-pagos" class="card hidden">
        <label>💰 ¿Hay que abonar en el lugar?</label>
        <select id="pago-si-no" onchange="mostrarMonto()">
            <option value="no">No</option>
            <option value="si">Sí</option>
        </select>
        <div id="caja-monto" class="hidden">
            <input id="monto-valor" type="number" placeholder="¿Cuánto dinero llevamos?">
        </div>
    </div>

    <div id="map"></div>

    <div class="total-box">
        Total Estimado: <span id="total-text">$ 0</span>
    </div>

    <button class="btn-send" onclick="enviarPedido()">Pedir Mandadito por WhatsApp 📲</button>
</div>

<script>
    const MI_WHATSAPP = "5493764904731";
    let map, directionsService, directionsRenderer, autocompleteOri, autocompleteDes;

    function initMap() {
        const posadas = { lat: -27.367, lng: -55.896 };
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 13,
            center: posadas,
            disableDefaultUI: true
        });

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

        // Autocompletado limitado a Argentina
        const options = { componentRestrictions: { country: "ar" } };
        autocompleteOri = new google.maps.places.Autocomplete(document.getElementById('origen'), options);
        autocompleteDes = new google.maps.places.Autocomplete(document.getElementById('destino'), options);

        autocompleteOri.addListener('place_changed', calcularRuta);
        autocompleteDes.addListener('place_changed', calcularRuta);
    }

    function calcularRuta() {
        const ori = document.getElementById('origen').value;
        const des = document.getElementById('destino').value;
        const servicio = document.getElementById("tipo-servicio").value;

        // Mostrar u ocultar sección de pagos según servicio
        document.getElementById("seccion-pagos").classList.toggle("hidden", servicio === "Mandado normal");

        if (!ori || !des) return;

        directionsService.route({
            origin: ori,
            destination: des,
            travelMode: google.maps.TravelMode.DRIVING
        }, (response, status) => {
            if (status === "OK") {
                directionsRenderer.setDirections(response);
                const distanciaKm = response.routes[0].legs[0].distance.value / 1000;
                actualizarPrecio(distanciaKm, servicio);
            }
        });
    }

    function actualizarPrecio(km, servicio) {
        let base = 1200; // Mandado normal base
        if (servicio === "Compras") base = 2000;
        if (servicio === "Retiro de productos o estudios medicos") base = 5000;

        // Sumamos $300 por cada kilómetro extra después de los primeros 2km
        let extraKm = km > 2 ? (km - 2) * 300 : 0;
        let total = Math.round(base + extraKm);

        document.getElementById("total-text").innerText = `$ ${total.toLocaleString('es-AR')}`;
    }

    function mostrarMonto() {
        const pago = document.getElementById("pago-si-no").value;
        document.getElementById("caja-monto").classList.toggle("hidden", pago !== "si");
    }

    function enviarPedido() {
        const ori = document.getElementById("origen").value;
        const des = document.getElementById("destino").value;
        const det = document.getElementById("detalle").value;
        const servicio = document.getElementById("tipo-servicio").value;
        const total = document.getElementById("total-text").innerText;
        const monto = document.getElementById("monto-valor").value;

        if (!ori || !des) return alert("Por favor, ingresá las direcciones.");

        let msg = `*NUEVO PEDIDO: ${servicio.toUpperCase()}*%0A%0A`;
        msg += `📍 *Retiro:* ${ori}%0A`;
        msg += `📍 *Entrega:* ${des}%0A`;
        msg += `📦 *Detalles:* ${det}%0A`;
        if (monto) msg += `💰 *Dinero a llevar:* $${monto}%0A`;
        msg += `%0A💵 *Precio estimado:* ${total}`;

        window.open(`https://wa.me/${MI_WHATSAPP}?text=${msg}`);
    }

    google.maps.event.addDomListener(window, 'load', initMap);
</script>

</body>
</html>
